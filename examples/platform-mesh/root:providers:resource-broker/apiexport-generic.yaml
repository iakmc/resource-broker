apiVersion: apis.kcp.io/v1alpha2
kind: APIExport
metadata:
  name: generic.platform-mesh.io
  labels:
    ui.platform-mesh.io/content-for: generic.platform-mesh.io
spec:
  resources:
    - group: pki.generic.platform-mesh.io
      name: certificates
      schema: current.certificates.pki.generic.platform-mesh.io
      storage:
        crd: {}
    - group: compute.generic.platform-mesh.io
      name: virtualmachines
      schema: current.virtualmachines.compute.generic.platform-mesh.io
      storage:
        crd: {}
  permissionClaims:
    - resource: secrets
      verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: generic-apiexport-bind
rules:
  - apiGroups:
      - apis.kcp.io
    resources:
      - apiexports
    verbs:
      - bind
    resourceNames:
      - generic.platform-mesh.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: generic-apiexport-anonymous-bind
subjects:
  - kind: User
    name: system:anonymous
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: generic-apiexport-bind
  apiGroup: rbac.authorization.k8s.io

apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-broker-portal
  namespace: resource-broker-system
  labels:
    app: resource-broker-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-broker-portal
  template:
    metadata:
      labels:
        app: resource-broker-portal
    spec:
      containers:
        - name: portal
          image: resource-broker-portal:dev
          ports:
            - containerPort: 80
              name: http
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

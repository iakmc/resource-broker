---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: resource-broker
rules:
- apiGroups:
  - compute.generic.platform-mesh.io
  resources:
  - vms
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - compute.generic.platform-mesh.io
  resources:
  - vms/finalizers
  verbs:
  - update
- apiGroups:
  - compute.generic.platform-mesh.io
  resources:
  - vms/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - pki.generic.platform-mesh.io
  resources:
  - certificates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - pki.generic.platform-mesh.io
  resources:
  - certificates/finalizers
  verbs:
  - update
- apiGroups:
  - pki.generic.platform-mesh.io
  resources:
  - certificates/status
  verbs:
  - get
  - patch
  - update
